name: Build and Deploy Static Next.js Site

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out code explicitly passing the token
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Use Node.js 18 for compilation
      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: 'npm'

      # Step 3: Install dependencies cleanly
      - name: Install dependencies
        run: npm ci

      # Step 4: Build static site (Creates the ./out folder)
      - name: Build Static Site
        run: npm run build

      # Step 5: Package the static distribution files
      - name: Upload production-ready static artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
