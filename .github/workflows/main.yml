name: Build and Deploy Static Next.js Site

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your code (Ensure v4 is used)
      - uses: actions/checkout@v4

      # Step 2: Use Node.js 18 for your Next.js app 
      # (This is totally fine; your app code version and the runner engine version are separate)
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Build static site
      - name: Build Static Site
        run: npm run build

      # Step 5: Clean, modern GitHub Pages deployment
      # 🚀 THE FIX: peaceiris/actions-gh-pages is heavily tied to old Node versions.
      # Switching to GitHub's native deployment actions runs on Node 24 by default.
      - name: Upload production-ready static artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    # Separate deployment job using official GitHub native architecture
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
