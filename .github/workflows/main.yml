name: Build and Deploy Static Next.js Site

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 🚀 UPGRADED: v4 -> v6 natively targets Node 24
      - uses: actions/checkout@v6

      # 🚀 UPGRADED: v4 -> v6 natively targets Node 24
      - uses: actions/setup-node@v6
        with:
          node-version: 18 # Your Next.js app can safely remain on 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Static Site
        run: npm run build

      - name: Upload production-ready static artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
